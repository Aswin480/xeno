<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="50" cy="50" r="30" fill="url(#logo-grad)" opacity="0.15" filter="url(#glow)" />
  <!-- Hexagon Outer -->
  <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" fill="none" stroke="url(#logo-grad)" stroke-width="6" stroke-linejoin="round" />
  <!-- Inner Copilot X Shape -->
  <path d="M38,38 L62,62 M62,38 L38,62" fill="none" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" />
  <!-- Center Dot -->
  <circle cx="50" cy="50" r="6" fill="#030712" stroke="url(#logo-grad)" stroke-width="4" />
</svg>
